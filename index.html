<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>iThoughts — Athletic Training</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f18;
    --card: #141420;
    --card2: #1a1a28;
    --border: #22223a;
    --accent: #5b8dee;
    --accent2: #7c6de8;
    --gold: #f59e0b;
    --green: #10b981;
    --text: #eeeef8;
    --soft: #8888aa;
    --muted: #44445a;
    --pill-bg: #1a2040;
    --pill-border: #2a3a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  .page-wrap {
    max-width: 420px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* HEADER */
  .header {
    padding: 20px 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo em {
    font-style: normal;
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .counter-pill {
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .beta-badge {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: white;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  /* NEW CARD BUTTON */
  .new-card-btn {
    width: 100%;
    border: 1.5px dashed var(--border);
    background: transparent;
    color: var(--soft);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .new-card-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .card-tag {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-body-text {
    font-size: 14px;
    color: var(--soft);
    line-height: 1.7;
    margin-bottom: 14px;
  }

  .dropped-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }

  /* PILLS */
  .pills-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
    min-height: 8px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    border-radius: 20px;
    padding: 5px 10px 5px 8px;
  }

  .pill-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .pill-text {
    font-size: 12px;
    color: var(--text);
  }

  .pill-remove {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 15px;
    cursor: pointer;
    padding: 0;
    margin-left: 2px;
    line-height: 1;
    transition: color 0.2s;
  }

  .pill-remove:hover { color: #ff6b6b; }

  /* CARD ACTIONS */
  .card-actions {
    display: flex;
    gap: 8px;
  }

  .drop-btn {
    flex: 1;
    border: 1.5px dashed var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .drop-btn:hover { background: rgba(91,141,238,0.08); }

  .refresh-btn {
    flex: 1;
    border: 1.5px solid var(--green);
    background: transparent;
    color: var(--green);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .refresh-btn:hover { background: rgba(16,185,129,0.08); }
  .refresh-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* THINKING INDICATOR */
  .thinking-indicator {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 0 2px;
    color: var(--soft);
    font-size: 12px;
  }

  .thinking-indicator.active { display: flex; }

  .dot-pulse {
    display: flex;
    gap: 4px;
  }

  .dot-pulse span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* DECK SECTION */
  .deck-section {
    display: none;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .deck-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .deck-slider-wrapper {
    overflow: hidden;
    border-radius: 12px;
  }

  .deck-slider-track {
    display: flex;
    transition: transform 0.35s ease;
  }

  .deck-card {
    min-width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--green);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .deck-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .deck-card-teaser {
    font-size: 13px;
    color: var(--soft);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .analogy-box {
    background: rgba(8,8,16,0.5);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 12px;
  }

  .analogy-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .analogy-text {
    font-size: 12px;
    color: var(--soft);
    line-height: 1.6;
  }

  .ibuttons-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .i-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .i-btn:hover { background: rgba(245,158,11,0.18); }

  .i-icon {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--gold);
    color: #080810;
    font-size: 9px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* CARD DETAIL FRAME — z-index 50, NO shared IDs */
  .card-detail-frame {
    position: absolute;
    inset: 0;
    z-index: 50;
    background: var(--card2);
    border-radius: 12px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .card-detail-frame.open {
    opacity: 1;
    pointer-events: all;
  }

  .card-detail-kw {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 8px;
  }

  .card-detail-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-detail-body {
    font-size: 13px;
    color: var(--soft);
    line-height: 1.7;
    flex: 1;
  }

  .card-detail-close {
    margin-top: 14px;
    background: none;
    border: 1px solid var(--border);
    color: var(--soft);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 9px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .card-detail-close:hover { border-color: var(--soft); color: var(--text); }

  /* SLIDER NAV */
  .deck-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }

  .deck-nav-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--soft);
    font-size: 16px;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .deck-nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .deck-dots { display: flex; gap: 5px; align-items: center; }

  .deck-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }

  .deck-dot.active { background: var(--accent); }

  .deck-counter {
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    text-align: right;
  }

  /* OVERLAYS */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(8,8,16,0.85);
    backdrop-filter: blur(4px);
    align-items: flex-end;
    justify-content: center;
  }

  .overlay.open { display: flex; }

  .sheet {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 420px;
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--muted);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .sheet-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .sheet-label {
    font-size: 12px;
    color: var(--soft);
    margin-bottom: 6px;
  }

  .sheet-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }

  .sheet-input:focus { border-color: var(--accent); }
  .sheet-input::placeholder { color: var(--muted); }

  .sheet-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-bottom: 8px;
  }

  .sheet-btn:hover { opacity: 0.88; }
  .sheet-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .sheet-cancel {
    width: 100%;
    background: none;
    border: none;
    color: var(--soft);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="page-wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">i<em>Thoughts</em></div>
    <div class="header-right">
      <div class="counter-pill" id="thoughtCounter">0 thoughts</div>
      <div class="beta-badge">Beta</div>
    </div>
  </div>

  <!-- NEW CARD BUTTON -->
  <button class="new-card-btn" onclick="openCreateOverlay()">
    <span style="font-size:18px;line-height:1">+</span> New card
  </button>

  <!-- CARDS CONTAINER -->
  <div id="cardsContainer"></div>

</div>

<!-- INPUT OVERLAY (Drop a thought) -->
<div class="overlay" id="inputOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="inputOverlayTitle">Drop a thought</div>
    <p class="sheet-label" id="inputOverlayHint">What did you notice?</p>
    <textarea class="sheet-input" id="thoughtInput" rows="3" placeholder="e.g. Left knee clicks at the 8km mark…"></textarea>
    <button class="sheet-btn" onclick="confirmDropThought()">Drop it</button>
    <button class="sheet-cancel" onclick="closeInputOverlay()">Cancel</button>
  </div>
</div>

<!-- CREATE OVERLAY (New card) -->
<div class="overlay" id="createOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">New Card</div>
    <p class="sheet-label">Card heading</p>
    <input type="text" class="sheet-input" id="createHeading" placeholder="e.g. Recovery Patterns">
    <p class="sheet-label">What's this card about?</p>
    <textarea class="sheet-input" id="createBlurb" rows="3" placeholder="Describe what you want to track…"></textarea>
    <button class="sheet-btn" id="createSubmitBtn" onclick="submitCreateCard()">Create card</button>
    <button class="sheet-cancel" onclick="closeCreateOverlay()">Cancel</button>
  </div>
</div>

<script>
  const WEBHOOK = 'https://hook.eu2.make.com/vjk9xakasvj6buvmrx8beaeukvwfqd54';
  const PAGE_KEY = 'athletic';

  // ── LOCAL STORAGE ──────────────────────────────────────────
  function lsKey(cardId) { return `ithoughts_${PAGE_KEY}_${cardId}`; }

  function savePills(cardId) {
    const pills = Array.from(
      document.getElementById(`pills-${cardId}`)
        .querySelectorAll('.pill-text')
    ).map(el => el.textContent);
    localStorage.setItem(lsKey(cardId), JSON.stringify(pills));
    updateCounter();
  }

  function loadPills(cardId) {
    try {
      const s = localStorage.getItem(lsKey(cardId));
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  }

  // ── COUNTER ────────────────────────────────────────────────
  function updateCounter() {
    let total = 0;
    document.querySelectorAll('.pills-row').forEach(row => {
      total += row.querySelectorAll('.pill').length;
    });
    const el = document.getElementById('thoughtCounter');
    el.textContent = total === 1 ? '1 thought' : `${total} thoughts`;
  }

  // ── PARSE AI RESPONSE ──────────────────────────────────────
  function parseAIResponse(data) {
    let text = '';
    if (data && data.content && Array.isArray(data.content)) {
      text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    } else if (typeof data === 'string') {
      text = data;
    } else {
      text = JSON.stringify(data);
    }
    return JSON.parse(text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim());
  }

  // ── SEED CARDS ─────────────────────────────────────────────
  const SEED_CARDS = [
    {
      id: 'training',
      tag: '🏃 TRAINING',
      title: 'Training Observations',
      body: "Your body sends signals every session. Most athletes miss them because there's no system to catch them. Drop what you notice — even if it seems minor.",
      pills: [
        'Left hip tightens at the 15km mark',
        'Best runs always follow 8 hours sleep',
        'Breathing changes 2 mins before hitting the wall'
      ]
    },
    {
      id: 'mental',
      tag: '💪 MENTAL',
      title: 'Mental Performance',
      body: "The mental game is where races are won or lost. Your mind has patterns you haven't named yet — iThoughts helps you find them.",
      pills: [
        'I run better in the morning',
        'Music tempo shifts my pace more than I realise'
      ]
    },
    {
      id: 'howto',
      tag: '⚙️ HOW IT WORKS',
      title: 'How to Use iThoughts',
      body: "Drop your raw observations as pills on any card. When you've built up enough, hit Refresh — AI synthesises them into new cards. The deck grows itself.",
      pills: []
    }
  ];

  let activeCardId = null;

  // ── PILLS ──────────────────────────────────────────────────
  function addPillToCard(cardId, text) {
    const row = document.getElementById(`pills-${cardId}`);
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.innerHTML = `
      <div class="pill-dot"></div>
      <span class="pill-text">${escHtml(text)}</span>
      <button class="pill-remove" onclick="removePill(this,'${cardId}')">×</button>
    `;
    row.appendChild(pill);
    savePills(cardId);
  }

  function removePill(btn, cardId) {
    btn.closest('.pill').remove();
    savePills(cardId);
  }

  // ── INPUT OVERLAY ──────────────────────────────────────────
  function openInputOverlay(cardId) {
    activeCardId = cardId;
    const card = SEED_CARDS.find(c => c.id === cardId);
    document.getElementById('inputOverlayTitle').textContent = 'Drop a thought';
    document.getElementById('inputOverlayHint').textContent =
      card ? `What have you noticed? (${card.title})` : 'What did you notice?';
    document.getElementById('thoughtInput').value = '';
    document.getElementById('inputOverlay').classList.add('open');
    setTimeout(() => document.getElementById('thoughtInput').focus(), 120);
  }

  function closeInputOverlay() {
    document.getElementById('inputOverlay').classList.remove('open');
    activeCardId = null;
  }

  function confirmDropThought() {
    const val = document.getElementById('thoughtInput').value.trim();
    if (!val || !activeCardId) return;
    addPillToCard(activeCardId, val);
    closeInputOverlay();
  }

  // ── CREATE OVERLAY ─────────────────────────────────────────
  function openCreateOverlay() {
    document.getElementById('createHeading').value = '';
    document.getElementById('createBlurb').value = '';
    document.getElementById('createOverlay').classList.add('open');
    setTimeout(() => document.getElementById('createHeading').focus(), 120);
  }

  function closeCreateOverlay() {
    document.getElementById('createOverlay').classList.remove('open');
  }

  async function submitCreateCard() {
    const heading = document.getElementById('createHeading').value.trim();
    const blurb   = document.getElementById('createBlurb').value.trim();
    if (!heading) return;

    const btn = document.getElementById('createSubmitBtn');
    btn.textContent = 'Creating…';
    btn.disabled = true;

    const prompt =
`You are an iTabs card writer.
Heading: "${heading}"
Blurb: "${blurb}"
Rules: title max 6 words, body 2 sentences, tag = emoji + 2 words
Respond ONLY with valid JSON:
{"title": "...", "body": "...", "tag": "💡 Topic Name"}`;

    let cardData = null;
    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      cardData = parseAIResponse(data);
    } catch (e) {
      // Fallback: build card without AI
      cardData = {
        title: heading,
        body: blurb || 'Track your observations here.',
        tag: '💡 ' + heading.split(' ').slice(0, 2).join(' ')
      };
    }

    const id = 'c' + Date.now();
    const newCard = { id, tag: cardData.tag, title: cardData.title, body: cardData.body, pills: [] };
    SEED_CARDS.push(newCard);
    renderCard(newCard);

    const el = document.getElementById(`card-${id}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });

    btn.textContent = 'Create card';
    btn.disabled = false;
    closeCreateOverlay();
  }

  // ── CARD DETAIL FRAME — querySelector only, no shared IDs ──
  function openFrame(btn, kw, title, detail) {
    const deckCard = btn.closest('.deck-card');
    const frame    = deckCard.querySelector('.card-detail-frame');
    frame.querySelector('.card-detail-kw').textContent    = kw.toUpperCase();
    frame.querySelector('.card-detail-title').textContent = title;
    frame.querySelector('.card-detail-body').textContent  = detail;
    frame.classList.add('open');
  }

  function closeFrame(btn) {
    btn.closest('.card-detail-frame').classList.remove('open');
  }

  // ── SLIDER ─────────────────────────────────────────────────
  function initSlider(deckSection) {
    const track   = deckSection.querySelector('.deck-slider-track');
    const dotsEl  = deckSection.querySelectorAll('.deck-dot');
    const counter = deckSection.querySelector('.deck-counter');
    let current = 0;
    let startX  = 0;

    function go(idx) {
      const cards = track.querySelectorAll('.deck-card');
      if (idx < 0 || idx >= cards.length) return;
      current = idx;
      track.style.transform = `translateX(-${current * 100}%)`;
      dotsEl.forEach((d, i) => d.classList.toggle('active', i === current));
      if (counter) counter.textContent = `${current + 1}/${cards.length}`;
    }

    deckSection.querySelector('.deck-prev').addEventListener('click', () => go(current - 1));
    deckSection.querySelector('.deck-next').addEventListener('click', () => go(current + 1));

    track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    track.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) go(diff > 0 ? current + 1 : current - 1);
    }, { passive: true });

    go(0);
  }

  // ── REFRESH ────────────────────────────────────────────────
  async function refreshCard(cardId, cardTitle) {
    const cardEl    = document.getElementById(`card-${cardId}`);
    const pills     = Array.from(cardEl.querySelectorAll('.pill-text')).map(el => el.textContent);

    if (pills.length === 0) {
      alert('Drop some thoughts first, then hit Refresh!');
      return;
    }

    const refreshBtn  = cardEl.querySelector('.refresh-btn');
    const thinking    = cardEl.querySelector('.thinking-indicator');
    const deckSection = cardEl.querySelector('.deck-section');

    refreshBtn.disabled = true;
    thinking.classList.add('active');
    deckSection.style.display = 'none';

    const numbered = pills.map((p, i) => `${i + 1}. ${p}`).join('\n');

    const prompt =
`You are an iThoughts AI synthesiser. Read the iThoughts below and synthesise 2 NEW card ideas.

Original card: "${cardTitle}"

iThoughts:
${numbered}

Rules:
- title: max 5 words, punchy, no fluff
- teaser: ONE short sentence, plain language
- analogy_title: "Think of it like..." or "The pattern is..."
- analogy: 1-2 sentences, real-world comparison
- ibuttons: exactly 2 objects with keyword (1-2 words) and detail (2 sentences)

Respond ONLY with valid JSON:
{"cards": [{"title": "...", "teaser": "...", "analogy_title": "...", "analogy": "...", "ibuttons": [{"keyword": "...", "detail": "..."}, {"keyword": "...", "detail": "..."}]}, {...}]}`;

    let result = null;
    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      result = parseAIResponse(data);
    } catch (e) {
      thinking.classList.remove('active');
      refreshBtn.disabled = false;
      alert('Synthesis failed — check your connection and try again.');
      return;
    }

    thinking.classList.remove('active');
    refreshBtn.disabled = false;

    if (!result || !result.cards || !result.cards.length) return;

    const cards = result.cards;

    const dotsHtml = cards.map((_, i) =>
      `<div class="deck-dot${i === 0 ? ' active' : ''}"></div>`
    ).join('');

    const deckCardsHtml = cards.map(c => {
      const ibtns = (c.ibuttons || []).slice(0, 2).map(ib => {
        const kw  = (ib.keyword || '').replace(/'/g, '&#39;');
        const ttl = (c.title   || '').replace(/'/g, '&#39;');
        const det = (ib.detail || '').replace(/'/g, '&#39;');
        return `<button class="i-btn" onclick="openFrame(this,'${kw}','${ttl}','${det}')">
          <div class="i-icon">i</div>${ib.keyword}
        </button>`;
      }).join('');

      return `
        <div class="deck-card">
          <div class="ai-badge">✦ AI SYNTHESISED</div>
          <div class="deck-card-title">${escHtml(c.title)}</div>
          <div class="deck-card-teaser">${escHtml(c.teaser)}</div>
          <div class="analogy-box">
            <div class="analogy-label">${escHtml(c.analogy_title || 'Think of it like...')}</div>
            <div class="analogy-text">${escHtml(c.analogy)}</div>
          </div>
          <div class="ibuttons-row">${ibtns}</div>
          <div class="card-detail-frame">
            <div class="card-detail-kw"></div>
            <div class="card-detail-title"></div>
            <div class="card-detail-body"></div>
            <button class="card-detail-close" onclick="closeFrame(this)">← Close</button>
          </div>
        </div>`;
    }).join('');

    deckSection.innerHTML = `
      <div class="deck-label">Growing deck from your thoughts</div>
      <div class="deck-slider-wrapper">
        <div class="deck-slider-track">${deckCardsHtml}</div>
      </div>
      <div class="deck-nav">
        <button class="deck-nav-btn deck-prev">‹</button>
        <div class="deck-dots">${dotsHtml}</div>
        <div class="deck-counter">1/${cards.length}</div>
        <button class="deck-nav-btn deck-next">›</button>
      </div>`;

    deckSection.style.display = 'block';
    initSlider(deckSection);
  }

  // ── RENDER CARD ────────────────────────────────────────────
  function renderCard(card) {
    const savedPills   = loadPills(card.id);
    const pillsToRender = savedPills !== null ? savedPills : card.pills;

    const pillsHtml = pillsToRender.map(p => `
      <div class="pill">
        <div class="pill-dot"></div>
        <span class="pill-text">${escHtml(p)}</span>
        <button class="pill-remove" onclick="removePill(this,'${card.id}')">×</button>
      </div>`).join('');

    const safeTitle = (card.title || '').replace(/'/g, "\\'");

    const html = `
      <div class="card" id="card-${card.id}">
        <div class="card-tag">${card.tag}</div>
        <div class="card-title">${escHtml(card.title)}</div>
        <div class="card-body-text">${escHtml(card.body)}</div>
        <div class="dropped-label">ITHOUGHTS DROPPED</div>
        <div class="pills-row" id="pills-${card.id}">${pillsHtml}</div>
        <div class="card-actions">
          <button class="drop-btn" onclick="openInputOverlay('${card.id}')">
            + Drop a thought
          </button>
          <button class="refresh-btn" onclick="refreshCard('${card.id}','${safeTitle}')">
            ↻ Refresh
          </button>
        </div>
        <div class="thinking-indicator">
          <div class="dot-pulse"><span></span><span></span><span></span></div>
          Synthesising your thoughts…
        </div>
        <div class="deck-section"></div>
      </div>`;

    document.getElementById('cardsContainer').insertAdjacentHTML('beforeend', html);
  }

  // ── UTILITY ────────────────────────────────────────────────
  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── INIT ───────────────────────────────────────────────────
  SEED_CARDS.forEach(card => renderCard(card));
  updateCounter();
</script>
</body>
</html>
