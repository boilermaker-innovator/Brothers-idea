<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iThoughts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f18;
  --card: #141420;
  --card2: #1a1a28;
  --border: #22223a;
  --accent: #5b8dee;
  --accent2: #7c6de8;
  --gold: #f59e0b;
  --green: #10b981;
  --text: #eeeef8;
  --soft: #8888aa;
  --muted: #44445a;
  --pill-bg: #1a2040;
  --pill-border: #2a3a6a;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.page {
  width: 100%;
  max-width: 420px;
  padding-bottom: 80px;
}

/* ============ HEADER ============ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
}

.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.logo-name span { color: var(--accent); }

.logo-sub {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--soft);
  text-transform: uppercase;
  margin-top: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.thought-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
}

.beta-pill {
  background: rgba(91,141,238,0.12);
  border: 1px solid rgba(91,141,238,0.3);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
}

/* ============ NEW CARD BTN ============ */
.new-card-wrap { padding: 14px 20px 6px; }

.new-card-btn {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1.5px dashed rgba(255,255,255,0.12);
  border-radius: var(--radius);
  color: var(--soft);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.new-card-btn:hover {
  border-color: rgba(91,141,238,0.4);
  color: var(--accent);
  background: rgba(91,141,238,0.06);
}

/* ============ CARDS ============ */
.cards-container {
  padding: 8px 20px 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-top { padding: 18px 18px 0; }

.card-tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 8px;
}

.card-body {
  font-size: 13px;
  line-height: 1.65;
  color: var(--soft);
  padding: 0 18px 14px;
}

/* ============ THOUGHTS ============ */
.thoughts-section { padding: 0 18px 12px; }

.thoughts-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--soft);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.thoughts-pills {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.thought-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--pill-bg);
  border: 1px solid var(--pill-border);
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 13px;
  color: rgba(238,238,248,0.85);
  animation: pillIn 0.25s ease;
}

@keyframes pillIn {
  from { opacity: 0; transform: translateY(-5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.pill-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.pill-text { flex: 1; }

.pill-remove {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  padding: 0;
  transition: color 0.15s;
}

.pill-remove:hover { color: var(--soft); }

/* ============ CARD ACTIONS ============ */
.card-actions {
  display: flex;
  gap: 8px;
  padding: 0 18px 18px;
}

.drop-btn {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.drop-btn:hover {
  background: rgba(91,141,238,0.08);
  border-color: rgba(91,141,238,0.3);
}

.refresh-btn {
  flex: 1;
  padding: 10px;
  background: var(--green);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.refresh-btn:hover { background: #0ea572; }
.refresh-btn:disabled { opacity: 0.55; cursor: not-allowed; }

.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============ THINKING ============ */
.thinking-row {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 18px 14px;
  font-size: 12px;
  color: var(--soft);
}

.thinking-row.active { display: flex; }

.t-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  animation: tdot 1.2s infinite;
}
.t-dot:nth-child(2) { animation-delay: 0.2s; }
.t-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes tdot {
  0%,80%,100% { transform: scale(0.5); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* ============ DECK SECTION ============ */
.deck-section {
  display: none;
  border-top: 1px solid var(--border);
  padding: 14px 18px 18px;
}

.deck-section.active { display: block; }

.deck-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* Slider */
.slider-wrap { position: relative; overflow: hidden; }

.slider-track {
  display: flex;
  transition: transform 0.3s ease;
}

.deck-card {
  flex: 0 0 100%;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  position: relative;
}

.deck-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.deck-card-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 6px;
}

.deck-card-teaser {
  font-size: 13px;
  color: var(--soft);
  line-height: 1.55;
  margin-bottom: 10px;
}

.deck-analogy {
  background: rgba(245,158,11,0.06);
  border: 1px solid rgba(245,158,11,0.15);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 10px;
}

.deck-analogy-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.deck-analogy-text {
  font-size: 12px;
  color: var(--soft);
  line-height: 1.55;
}

/* ============================================================
   i-buttons v0.6 — flex nowrap, never wraps
   ============================================================ */
.deck-ibuttons {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 8px;
  overflow: hidden;
}

.deck-ibutton {
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 10px;
  background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.25);
  border-radius: 20px;
  color: var(--gold);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.deck-ibutton:hover { background: rgba(245,158,11,0.16); }

.i-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(245,158,11,0.2);
  border: 1px solid rgba(245,158,11,0.4);
  font-size: 9px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Card detail frame — inside the card */
.card-detail-frame {
  display: none;
  margin-top: 10px;
  background: rgba(245,158,11,0.06);
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: 10px;
  padding: 12px;
  animation: fadeIn 0.2s ease;
}

.card-detail-frame.open { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-detail-close-row {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 6px;
}

.card-detail-close-btn {
  background: none;
  border: none;
  color: var(--soft);
  font-size: 14px;
  cursor: pointer;
  padding: 0;
}

.card-detail-kw {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.card-detail-body {
  font-size: 13px;
  color: var(--soft);
  line-height: 1.6;
}

/* Slider nav */
.slider-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}

.snav-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 32px; height: 32px;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.snav-btn:hover { background: rgba(255,255,255,0.1); }

.slider-dots { display: flex; gap: 5px; align-items: center; }

.sdot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--muted);
  transition: all 0.2s;
  cursor: pointer;
}

.sdot.active {
  background: var(--gold);
  width: 14px;
  border-radius: 2px;
}

.slider-counter {
  font-size: 11px;
  color: var(--soft);
  font-weight: 600;
}

/* ============ OVERLAY / SHEET ============ */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  padding: 16px;
}

.overlay.active { display: flex; }

.sheet {
  background: #1a1a2a;
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 420px;
  border: 1px solid var(--border);
}

.sheet-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
}

.sheet-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--soft);
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}

.sheet-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}

.sheet-input:focus { border-color: rgba(91,141,238,0.4); }

.sheet-row { margin-bottom: 10px; }
.sheet-row .sheet-input { margin-bottom: 0; }

.sheet-actions { display: flex; gap: 8px; margin-top: 14px; }

.sheet-cancel {
  flex: 1;
  padding: 11px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--soft);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.sheet-confirm {
  flex: 2;
  padding: 11px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}

.sheet-confirm:hover { background: #4a7ce0; }
.sheet-confirm:disabled { opacity: 0.55; cursor: not-allowed; }

/* ============ TOAST ============ */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text);
  z-index: 999;
  transition: transform 0.3s ease;
  white-space: nowrap;
  pointer-events: none;
}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="logo-name"><span>i</span>Thoughts</div>
      <div class="logo-sub">Atomic Thought Capture</div>
    </div>
    <div class="header-right">
      <span class="thought-count" id="totalCount">0 thoughts</span>
      <span class="beta-pill">+ Beta</span>
    </div>
  </div>

  <!-- NEW CARD -->
  <div class="new-card-wrap">
    <button class="new-card-btn" onclick="openNewCard()">＋ New card</button>
  </div>

  <!-- CARDS -->
  <div class="cards-container" id="cardsContainer"></div>

</div>

<!-- DROP OVERLAY -->
<div class="overlay" id="dropOverlay">
  <div class="sheet">
    <div class="sheet-title">Drop a thought 🧱</div>
    <textarea class="sheet-input" id="dropInput" rows="3" placeholder="What did you notice?"></textarea>
    <div class="sheet-actions">
      <button class="sheet-cancel" onclick="closeOverlay('dropOverlay')">Cancel</button>
      <button class="sheet-confirm" onclick="confirmDrop()">Drop it</button>
    </div>
  </div>
</div>

<!-- NEW CARD OVERLAY -->
<div class="overlay" id="newCardOverlay">
  <div class="sheet">
    <div class="sheet-title">New card ✦</div>
    <div class="sheet-row">
      <label class="sheet-label">Topic</label>
      <input class="sheet-input" id="ncHeading" placeholder="e.g. Recovery Habits" style="margin-bottom:0;">
    </div>
    <div class="sheet-row">
      <label class="sheet-label">What's it about?</label>
      <textarea class="sheet-input" id="ncBlurb" rows="3" placeholder="Quick description..." style="margin-bottom:0;"></textarea>
    </div>
    <div class="sheet-actions">
      <button class="sheet-cancel" onclick="closeOverlay('newCardOverlay')">Cancel</button>
      <button class="sheet-confirm" id="ncBtn" onclick="confirmNewCard()">Create card</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ============================================
// CONFIG
// ============================================
const WEBHOOK = 'https://hook.eu2.make.com/vjk9xakasvj6buvmrx8beaeukvwfqd54';
const PAGE_KEY = 'athletic';

function lsKey(cardId) { return `ithoughts_${PAGE_KEY}_${cardId}`; }

// ============================================
// SEED CARDS
// ============================================
const SEED_CARDS = [
  {
    id: 'training',
    tag: '🏃 TRAINING',
    title: 'Training Observations',
    body: "Your body sends signals every session. Most athletes miss them because there's no system to catch them. Drop what you notice — even if it seems minor.",
    pills: [
      'Left hip tightens at the 15km mark',
      'Best runs always follow 8 hours sleep',
      'Breathing changes 2 mins before hitting the wall'
    ]
  },
  {
    id: 'mental',
    tag: '💪 MENTAL',
    title: 'Mental Performance',
    body: "The mental game is where races are won or lost. Your mind has patterns you haven't named yet — iThoughts helps you find them.",
    pills: [
      'I run better in the morning',
      'Music tempo shifts my pace more than I realise'
    ]
  },
  {
    id: 'howto',
    tag: '⚙️ HOW IT WORKS',
    title: 'How to Use iThoughts',
    body: "Drop your raw observations as pills on any card. When you've built up enough, hit Refresh — AI synthesises them into new cards. The deck grows itself.",
    pills: []
  }
];

let activeDropCard = null;
let dynamicCardCount = 0;

// ============================================
// INIT
// ============================================
window.addEventListener('DOMContentLoaded', () => {
  SEED_CARDS.forEach(card => renderCard(card));
  updateCounter();
});

// ============================================
// RENDER CARD
// ============================================
function renderCard(card) {
  const savedPills = loadPills(card.id);
  const pills = savedPills !== null ? savedPills : card.pills;

  const el = document.createElement('div');
  el.className = 'card';
  el.id = 'card-' + card.id;

  el.innerHTML = `
    <div class="card-top">
      <div class="card-tag">${escHtml(card.tag)}</div>
      <div class="card-title">${escHtml(card.title)}</div>
    </div>
    <div class="card-body">${escHtml(card.body)}</div>
    <div class="thoughts-section">
      <div class="thoughts-label">iThoughts Dropped</div>
      <div class="thoughts-pills" id="pills-${card.id}"></div>
    </div>
    <div class="card-actions">
      <button class="drop-btn" onclick="openDrop('${card.id}')">＋ Drop a thought</button>
      <button class="refresh-btn" id="refresh-${card.id}" onclick="refreshCard('${card.id}')">↻ Refresh</button>
    </div>
    <div class="thinking-row" id="thinking-${card.id}">
      <div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>
      <span>Reading your bricks...</span>
    </div>
    <div class="deck-section" id="deck-${card.id}">
      <div class="deck-label">Growing deck from your thoughts</div>
      <div class="slider-wrap">
        <div class="slider-track" id="track-${card.id}"></div>
      </div>
      <div class="slider-nav">
        <button class="snav-btn" onclick="sliderGo('${card.id}', -1)">←</button>
        <div class="slider-dots" id="sdots-${card.id}"></div>
        <span class="slider-counter" id="scounter-${card.id}"></span>
        <button class="snav-btn" onclick="sliderGo('${card.id}', 1)">→</button>
      </div>
    </div>
  `;

  document.getElementById('cardsContainer').appendChild(el);

  // Add saved pills
  pills.forEach(text => addPillToDom(card.id, text, false));
}

// ============================================
// SLIDER STATE
// ============================================
const sliderState = {};

function sliderGo(cardId, dir) {
  const s = sliderState[cardId];
  if (!s) return;
  const prev = s.current;
  s.current = Math.max(0, Math.min(s.current + dir, s.total - 1));
  const track = document.getElementById('track-' + cardId);
  track.style.transform = `translateX(-${s.current * 100}%)`;
  updateSliderUI(cardId, prev);
}

function updateSliderUI(cardId, prev) {
  const s = sliderState[cardId];
  const dots = document.getElementById('sdots-' + cardId);
  if (prev !== undefined) {
    dots.children[prev]?.classList.remove('active');
  }
  dots.children[s.current]?.classList.add('active');
  document.getElementById('scounter-' + cardId).textContent = `${s.current + 1}/${s.total}`;
}

// ============================================
// DROP A THOUGHT
// ============================================
function openDrop(cardId) {
  activeDropCard = cardId;
  document.getElementById('dropInput').value = '';
  openOverlay('dropOverlay');
  setTimeout(() => document.getElementById('dropInput').focus(), 100);
}

function confirmDrop() {
  const val = document.getElementById('dropInput').value.trim();
  if (!val) return;
  addPillToDom(activeDropCard, val, true);
  closeOverlay('dropOverlay');
}

function addPillToDom(cardId, text, save) {
  const container = document.getElementById('pills-' + cardId);
  if (!container) return;

  const pill = document.createElement('div');
  pill.className = 'thought-pill';
  pill.innerHTML = `
    <div class="pill-dot"></div>
    <div class="pill-text">${escHtml(text)}</div>
    <button class="pill-remove" onclick="removePill('${cardId}', this)">×</button>
  `;
  container.appendChild(pill);

  if (save) {
    savePills(cardId);
    updateCounter();
  }
}

function removePill(cardId, btn) {
  btn.closest('.thought-pill').remove();
  savePills(cardId);
  updateCounter();
}

// ============================================
// LOCALSTORAGE
// ============================================
function savePills(cardId) {
  const container = document.getElementById('pills-' + cardId);
  if (!container) return;
  const pills = Array.from(container.querySelectorAll('.pill-text')).map(el => el.textContent);
  localStorage.setItem(lsKey(cardId), JSON.stringify(pills));
}

function loadPills(cardId) {
  try {
    const s = localStorage.getItem(lsKey(cardId));
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}

// ============================================
// COUNTER
// ============================================
function updateCounter() {
  let total = 0;
  document.querySelectorAll('.thought-pill').forEach(() => total++);
  document.getElementById('totalCount').textContent = total + (total === 1 ? ' thought' : ' thoughts');
}

// ============================================
// REFRESH — MAKE.COM WEBHOOK
// ============================================
async function refreshCard(cardId) {
  const container = document.getElementById('pills-' + cardId);
  const pills = Array.from(container.querySelectorAll('.pill-text')).map(el => el.textContent);

  if (pills.length === 0) {
    showToast('⚠️ Drop at least one thought first');
    return;
  }

  const btn = document.getElementById('refresh-' + cardId);
  const thinkingRow = document.getElementById('thinking-' + cardId);
  const deckSection = document.getElementById('deck-' + cardId);

  btn.disabled = true;
  btn.innerHTML = '<span class="spin">↻</span>';
  thinkingRow.classList.add('active');
  deckSection.classList.remove('active');

  const cardTitle = document.querySelector(`#card-${cardId} .card-title`).textContent;

  const prompt = `You are an iThoughts AI synthesiser. Read the iThoughts below and synthesise 2 NEW card ideas.

Original card: "${cardTitle}"

iThoughts:
${pills.map((t, i) => `${i + 1}. ${t}`).join('\n')}

Rules:
- title: max 5 words, punchy, no fluff
- teaser: ONE short sentence, plain language
- analogy_title: short label like "Think of it like..." or "The pattern is..."
- analogy: one punchy analogy or real-world comparison, 1-2 sentences
- ibuttons: exactly 2 objects, each with keyword (1-2 words, short) and detail (2 sentences max)

Respond ONLY with valid JSON — no markdown, no backticks:
{"cards":[{"title":"...","teaser":"...","analogy_title":"...","analogy":"...","ibuttons":[{"keyword":"...","detail":"..."},{"keyword":"...","detail":"..."}]},{"title":"...","teaser":"...","analogy_title":"...","analogy":"...","ibuttons":[{"keyword":"...","detail":"..."},{"keyword":"...","detail":"..."}]}]}`;

  try {
    const response = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const parsed = parseAIResponse(data);

    // Build slider
    const track = document.getElementById('track-' + cardId);
    const dotsEl = document.getElementById('sdots-' + cardId);
    track.innerHTML = '';
    dotsEl.innerHTML = '';

    parsed.cards.forEach((synth, i) => {
      track.appendChild(buildDeckCard(cardId, synth));
      const dot = document.createElement('div');
      dot.className = 'sdot' + (i === 0 ? ' active' : '');
      dot.onclick = () => {
        const s = sliderState[cardId];
        const prev = s.current;
        s.current = i;
        track.style.transform = `translateX(-${i * 100}%)`;
        updateSliderUI(cardId, prev);
      };
      dotsEl.appendChild(dot);
    });

    sliderState[cardId] = { current: 0, total: parsed.cards.length };
    document.getElementById('scounter-' + cardId).textContent = `1/${parsed.cards.length}`;
    deckSection.classList.add('active');

  } catch (err) {
    showToast('⚠️ Could not reach AI — try again');
  }

  btn.disabled = false;
  btn.innerHTML = '↻ Refresh';
  thinkingRow.classList.remove('active');
}

// ============================================
// BUILD DECK CARD — dataset fix (v0.6 critical)
// ============================================
function buildDeckCard(cardId, synth) {
  const el = document.createElement('div');
  el.className = 'deck-card';

  el.innerHTML = `
    <div class="deck-badge">✦ AI SYNTHESISED · 🧱 BRICK</div>
    <div class="deck-card-title">${escHtml(synth.title)}</div>
    <div class="deck-card-teaser">${escHtml(synth.teaser)}</div>
    <div class="deck-analogy">
      <div class="deck-analogy-label">${escHtml(synth.analogy_title || 'Think of it like...')}</div>
      <div class="deck-analogy-text">${escHtml(synth.analogy)}</div>
    </div>
  `;

  // i-buttons — dataset, not inline onclick
  const ibRow = document.createElement('div');
  ibRow.className = 'deck-ibuttons';

  (synth.ibuttons || []).slice(0, 2).forEach(ib => {
    const btn = document.createElement('button');
    btn.className = 'deck-ibutton';
    btn.innerHTML = `<span class="i-dot">i</span> ${escHtml(ib.keyword)}`;
    btn.dataset.kw = ib.keyword;
    btn.dataset.detail = ib.detail;
    btn.addEventListener('click', function() {
      openFrame(this, this.dataset.kw, this.dataset.detail);
    });
    ibRow.appendChild(btn);
  });

  // card-detail-frame
  const frame = document.createElement('div');
  frame.className = 'card-detail-frame';
  frame.innerHTML = `
    <div class="card-detail-close-row">
      <button class="card-detail-close-btn" onclick="closeFrame(this)">✕ close</button>
    </div>
    <div class="card-detail-kw"></div>
    <div class="card-detail-body"></div>
  `;

  el.appendChild(ibRow);
  el.appendChild(frame);
  return el;
}

function openFrame(btn, kw, detail) {
  const deckCard = btn.closest('.deck-card');
  const frame = deckCard.querySelector('.card-detail-frame');
  frame.querySelector('.card-detail-kw').textContent = kw.toUpperCase();
  frame.querySelector('.card-detail-body').textContent = detail;
  frame.classList.add('open');
}

function closeFrame(btn) {
  btn.closest('.card-detail-frame').classList.remove('open');
}

// ============================================
// NEW CARD
// ============================================
function openNewCard() {
  document.getElementById('ncHeading').value = '';
  document.getElementById('ncBlurb').value = '';
  openOverlay('newCardOverlay');
  setTimeout(() => document.getElementById('ncHeading').focus(), 100);
}

async function confirmNewCard() {
  const heading = document.getElementById('ncHeading').value.trim();
  const blurb = document.getElementById('ncBlurb').value.trim();
  if (!heading) return;

  const btn = document.getElementById('ncBtn');
  btn.disabled = true;
  btn.textContent = 'Creating...';

  const prompt = `You are an iTabs card writer. Turn this rough idea into a polished iThoughts card.
Heading: "${heading}"
Blurb: "${blurb}"
Rules: title max 6 words, body 2 sentences max, tag = one emoji + 2 words (e.g. "💡 INSIGHT", "🔧 TOOLS")
Respond ONLY with valid JSON — no markdown:
{"title":"...","body":"...","tag":"..."}`;

  try {
    const response = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const parsed = parseAIResponse(data);
    addDynamicCard(parsed);
  } catch {
    addDynamicCard({ title: heading, body: blurb || 'Drop your thoughts below.', tag: '🧱 BRICK' });
  }

  btn.disabled = false;
  btn.textContent = 'Create card';
  closeOverlay('newCardOverlay');
}

function addDynamicCard(card) {
  const id = 'dyn-' + (++dynamicCardCount);
  renderCard({ id, tag: card.tag, title: card.title, body: card.body, pills: [] });
}

// ============================================
// PARSE AI RESPONSE
// ============================================
function parseAIResponse(data) {
  let text = '';
  if (data && data.content && Array.isArray(data.content)) {
    text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  } else if (typeof data === 'string') {
    text = data;
  } else {
    text = JSON.stringify(data);
  }
  return JSON.parse(text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim());
}

// ============================================
// OVERLAY UTILS
// ============================================
function openOverlay(id) { document.getElementById(id).classList.add('active'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('active'); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') ['dropOverlay', 'newCardOverlay'].forEach(closeOverlay);
});

// ============================================
// TOAST
// ============================================
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { toast.style.transform = 'translateX(-50%) translateY(80px)'; }, 3000);
}

// ============================================
// UTILS
// ============================================
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
