




<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="iTabs Deploy">
  <meta name="theme-color" content="#0e1117">
  <title>iTabs Deployer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e1117;
      --surface: #161b27;
      --border: #2d3748;
      --text: #e2e8f0;
      --muted: #718096;
      --dim: #4a5568;
      --amber: #f59e0b;
      --amber-dark: #d97706;
      --green: #22c55e;
      --green-dark: #16a34a;
      --radius: 10px;
      --mono: 'JetBrains Mono', 'Courier New', monospace;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-icon {
      background: linear-gradient(135deg, var(--amber), var(--amber-dark));
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-title { font-weight: 700; font-size: 1rem; color: #f7fafc; }
    .header-sub { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }
    .header-owner { margin-left: auto; font-size: 0.65rem; color: var(--dim); font-family: var(--mono); }

    /* CONTENT */
    .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

    /* STEP HEADER */
    .step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .step-badge {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.78rem; flex-shrink: 0;
    }
    .step-badge.inactive { background: var(--border); color: var(--muted); }
    .step-badge.active { background: linear-gradient(135deg, var(--amber), var(--amber-dark)); color: #0e1117; }
    .step-label { font-weight: 600; font-size: 0.9rem; }
    .step-tag {
      margin-left: auto;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.68rem;
      font-family: var(--mono);
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }

    /* TEXTAREA */
    textarea {
      width: 100%;
      min-height: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 12px;
      resize: vertical;
      outline: none;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    textarea::placeholder { color: var(--dim); }

    /* INPUT */
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8rem;
      outline: none;
    }
    input::placeholder { color: var(--dim); }

    /* LABEL */
    .field-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: block;
    }
    .field-group { margin-bottom: 14px; }

    /* BUTTONS */
    .btn-primary {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:disabled { cursor: default; opacity: 0.5; }
    .btn-amber { background: linear-gradient(135deg, var(--amber), var(--amber-dark)); color: #0e1117; }
    .btn-green { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: white; }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .btn-secondary {
      flex: 1;
      padding: 10px;
      background: #1a2332;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #a0aec0;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
    }

    /* PREVIEW */
    .code-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      max-height: 160px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: #a0aec0;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 10px;
    }

    /* STATUS */
    .status {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      line-height: 1.5;
      margin-top: 12px;
    }
    .status-info { background: #1e3a5f; border: 1px solid #3b82f655; color: #93c5fd; }
    .status-success { background: #166534aa; border: 1px solid #22c55e55; color: #86efac; }
    .status-error { background: #7f1d1daa; border: 1px solid #ef444455; color: #fca5a5; }

    /* TOKEN ROW */
    .token-wrap { position: relative; }
    .token-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.72rem; font-family: var(--sans);
    }

    /* REPO ROW */
    .repo-row { display: flex; align-items: center; gap: 6px; }
    .repo-prefix { color: var(--dim); font-size: 0.75rem; white-space: nowrap; font-family: var(--mono); }
    .repo-row input { flex: 1; }

    /* HINT */
    .hint { font-size: 0.68rem; color: var(--dim); margin-top: 10px; line-height: 1.5; }

    /* LIVE LINK */
    .live-link { display: block; margin-top: 8px; color: #34d399; font-size: 0.82rem; text-decoration: underline; }

    /* HIDDEN */
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">⚡</div>
    <div>
      <div class="header-title">iTabs Deployer</div>
      <div class="header-sub">Paste → Clean → Push to GitHub</div>
    </div>
    <div class="header-owner">boilermaker-innovator</div>
  </div>

  <div class="container">

    <!-- STEP 1: PASTE -->
    <div id="section-paste">
      <div class="step-header">
        <div class="step-badge active" id="badge1">1</div>
        <span class="step-label">Paste your HTML</span>
        <span class="step-tag hidden" id="ellipsis-tag" style="background:#7c3aed22;border:1px solid #7c3aed66;color:#a78bfa;"></span>
      </div>
      <textarea id="rawInput" placeholder="Paste your HTML code from Claude here..."></textarea>
      <button class="btn-primary btn-amber" id="btnClean" disabled>Clean Code →</button>
    </div>

    <!-- STEP 2: CLEANED -->
    <div id="section-cleaned" class="hidden" style="margin-top:20px;">
      <div class="step-header">
        <div class="step-badge active">2</div>
        <span class="step-label">Cleaned code</span>
        <span class="step-tag" id="clean-tag" style="background:#166534aa;border:1px solid #22c55e55;color:#86efac;"></span>
      </div>
      <div class="code-preview" id="codePreview"></div>
      <div class="btn-row">
        <button class="btn-secondary" id="btnCopy">Copy</button>
        <button class="btn-secondary" id="btnDownload">↓ Download .html</button>
      </div>
    </div>

    <!-- STEP 3: GITHUB -->
    <div id="section-github" class="hidden" style="margin-top:20px;">
      <div class="step-header">
        <div class="step-badge active">3</div>
        <span class="step-label">Push to GitHub</span>
      </div>
      <div class="card">

        <div class="field-group">
          <label class="field-label">GitHub Token</label>
          <div class="token-wrap">
            <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
            <button class="token-toggle" id="btnToggleToken">show</button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Repo name</label>
          <div class="repo-row">
            <span class="repo-prefix">boilermaker-innovator /</span>
            <input type="text" id="ghRepo" placeholder="business-name-estimator">
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">File path</label>
          <input type="text" id="ghFilePath" value="index.html">
        </div>

        <div class="field-group">
          <label class="field-label">Commit message</label>
          <input type="text" id="ghCommit" value="Deploy widget via iTabs Deployer">
        </div>

        <button class="btn-primary btn-green" id="btnPush">Push to GitHub →</button>

        <div id="pushStatus" class="hidden"></div>

        <div class="hint">
          Token needs Contents: Read &amp; write. Never stored — only used for this one API call.
          <br><a href="https://github.com/settings/tokens/new" target="_blank" style="color:#4a9eff;">Get a token →</a>
        </div>
      </div>
    </div>

  </div>

  <script>
  (function() {
    var OWNER = 'boilermaker-innovator';
    var ELLIPSIS = '\u2026'; // …
    var cleaned = '';

    var rawInput      = document.getElementById('rawInput');
    var btnClean      = document.getElementById('btnClean');
    var ellipsisTag   = document.getElementById('ellipsis-tag');
    var sectionCleaned = document.getElementById('section-cleaned');
    var sectionGithub  = document.getElementById('section-github');
    var codePreview   = document.getElementById('codePreview');
    var cleanTag      = document.getElementById('clean-tag');
    var btnCopy       = document.getElementById('btnCopy');
    var btnDownload   = document.getElementById('btnDownload');
    var ghToken       = document.getElementById('ghToken');
    var btnToggleToken = document.getElementById('btnToggleToken');
    var ghRepo        = document.getElementById('ghRepo');
    var ghFilePath    = document.getElementById('ghFilePath');
    var ghCommit      = document.getElementById('ghCommit');
    var btnPush       = document.getElementById('btnPush');
    var pushStatus    = document.getElementById('pushStatus');

    // Watch raw input
    rawInput.addEventListener('input', function() {
      var val = rawInput.value;
      btnClean.disabled = !val.trim();
      var count = (val.match(new RegExp(ELLIPSIS, 'g')) || []).length;
      if (count > 0) {
        ellipsisTag.textContent = count + ' \u2026 found';
        ellipsisTag.classList.remove('hidden');
      } else {
        ellipsisTag.classList.add('hidden');
      }
    });

    // Clean
    btnClean.addEventListener('click', function() {
      var raw = rawInput.value;
      var count = (raw.match(new RegExp(ELLIPSIS, 'g')) || []).length;
      cleaned = raw.split(ELLIPSIS).join('');

      // Show preview
      var preview = cleaned.substring(0, 800);
      if (cleaned.length > 800) preview += '\n\n... (' + cleaned.length + ' chars total)';
      codePreview.textContent = preview;

      // Tag
      cleanTag.textContent = count > 0 ? 'Removed ' + count + ' ellipsis' : 'No ellipsis found — clean';

      sectionCleaned.classList.remove('hidden');
      sectionGithub.classList.remove('hidden');
      resetPushStatus();
    });

    // Copy
    btnCopy.addEventListener('click', function() {
      navigator.clipboard.writeText(cleaned).then(function() {
        btnCopy.textContent = '✓ Copied!';
        setTimeout(function() { btnCopy.textContent = 'Copy'; }, 2000);
      });
    });

    // Download
    btnDownload.addEventListener('click', function() {
      var filename = ghFilePath.value || 'widget.html';
      var blob = new Blob([cleaned], { type: 'text/html' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename.split('/').pop();
      a.click();
      URL.revokeObjectURL(url);
    });

    // Token toggle
    btnToggleToken.addEventListener('click', function() {
      var isPassword = ghToken.type === 'password';
      ghToken.type = isPassword ? 'text' : 'password';
      btnToggleToken.textContent = isPassword ? 'hide' : 'show';
    });

    // Push
    btnPush.addEventListener('click', async function() {
      var token = ghToken.value.trim();
      var repo = ghRepo.value.trim();
      var filePath = ghFilePath.value.trim() || 'index.html';
      var commitMsg = ghCommit.value.trim() || 'Deploy widget via iTabs Deployer';

      if (!token) { showStatus('error', 'Enter your GitHub token first'); return; }
      if (!repo) { showStatus('error', 'Enter the repo name'); return; }
      if (!cleaned) { showStatus('error', 'Clean your code first'); return; }

      btnPush.disabled = true;
      btnPush.textContent = 'Pushing...';
      showStatus('info', 'Checking existing file...');

      var apiUrl = 'https://api.github.com/repos/' + OWNER + '/' + repo + '/contents/' + filePath;
      var headers = {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      };

      var sha;
      try {
        var check = await fetch(apiUrl, { headers: headers });
        if (check.ok) {
          var existing = await check.json();
          sha = existing.sha;
          showStatus('info', 'File exists \u2014 updating...');
        } else if (check.status === 404) {
          showStatus('info', 'New file \u2014 creating...');
        } else {
          throw new Error('GitHub returned ' + check.status);
        }
      } catch(e) {
        showStatus('error', 'Could not reach GitHub: ' + e.message);
        resetBtn();
        return;
      }

      // Encode to base64 (handles Unicode)
      var encoded = btoa(unescape(encodeURIComponent(cleaned)));
      var body = { message: commitMsg, content: encoded };
      if (sha) body.sha = sha;

      try {
        showStatus('info', 'Pushing...');
        var res = await fetch(apiUrl, {
          method: 'PUT',
          headers: headers,
          body: JSON.stringify(body)
        });
        if (res.ok) {
          var liveUrl = 'https://' + OWNER + '.github.io/' + repo + '/';
          showStatus('success',
            '\u2713 Done! Live at: ' + liveUrl +
            '<br><a href="' + liveUrl + '" target="_blank" class="live-link">Open live page \u2192</a>'
          );
        } else {
          var err = await res.json();
          throw new Error(err.message || 'Status ' + res.status);
        }
      } catch(e) {
        showStatus('error', 'Push failed: ' + e.message);
      }

      resetBtn();
    });

    function showStatus(type, msg) {
      pushStatus.className = 'status status-' + type;
      pushStatus.innerHTML = msg;
      pushStatus.classList.remove('hidden');
    }

    function resetPushStatus() {
      pushStatus.className = 'hidden';
      pushStatus.innerHTML = '';
    }

    function resetBtn() {
      btnPush.disabled = false;
      btnPush.textContent = 'Push to GitHub \u2192';
    }

  })();
  </script>

</body>
</html>
